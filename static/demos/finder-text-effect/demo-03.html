<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Implementing macOS Finder text shortening - Demo 03</title>
        <link rel="stylesheet" href="/css/demos.css" />
        <link rel="stylesheet" href="css/demo-03.css" />
    </head>
    <body>
        <div id="demo-03">
            <div class="card">
                <div class="card__body">
                    <table class="filenames-table">
                        <colgroup>
                            <col class="col-filename" />
                            <col class="col-modified-date" />
                        </colgroup>
                        <thead>
                            <tr>
                                <th class="col-filename">
                                    Name
                                    <div class="resize-handle"></div>
                                </th>
                                <th class="col-modified-date">Date Modified</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </body>

    <script src="js/demo-03.js"></script>
</html>
