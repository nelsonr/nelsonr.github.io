<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Implementing macOS Finder text shortening - Demo 01</title>
        <link rel="stylesheet" href="/css/demos.css" />
        <link rel="stylesheet" href="css/demo-01.css" />
    </head>
    <body>
        <div id="demo-01">
            <div class="card">
                <span class="card__label">Measured text</span>
                <div class="card__body">
                    <div id="movie-quote">
                        <span>You can't handle the truth!</span>
                    </div>
                    <div class="measurement-row">
                        <div id="ruler"></div>
                        <div id="display-size"></div>
                    </div>
                </div>
                <div class="card__footer">
                    <button type="button" id="next-quote">Random quote</button>
                </div>
            </div>
        </div>

        <script type="text/javascript" src="js/demo-01.js"></script>
    </body>
</html>
