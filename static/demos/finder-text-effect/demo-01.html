<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Implementing macOS Finder text shortening - Demo 01</title>
        <link rel="stylesheet" href="/css/demos.css" />
        <link rel="stylesheet" href="css/demo-01.css" />
    </head>
    <body>
        <div id="demo-01">
            <form>
                <input
                    type="text"
                    name="text"
                    value="You can't handle the truth!"
                />
                <button type="submit">Measure</button>
            </form>

            <section>
                <div id="movie-quote">
                    <span>You can't handle the truth!</span>
                </div>
                <div id="display-size">Size: <span></span></div>
            </section>
        </div>

        <script type="text/javascript" src="js/demo-01.js"></script>
    </body>
</html>
